<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>BOKUZUSHI - Star Breaker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        overflow: hidden;
        background: #050510;
        font-family: "Orbitron", "Segoe UI", sans-serif;
        color: #fff;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas#game { display: block; width: 100vw; height: 100vh; }

      /* ─── HUD ─── */
      #hud {
        position: fixed; top: 0; left: 0; width: 100%;
        padding: 10px 24px;
        display: flex; justify-content: space-between; align-items: center;
        pointer-events: none; z-index: 10;
        background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      }
      .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
      .hud-label { font-size: 10px; letter-spacing: 3px; opacity: 0.5; text-transform: uppercase; }
      .hud-value { font-weight: 700; font-size: 22px; text-shadow: 0 0 12px currentColor; }
      .penetration-stars { color: #ffd700; letter-spacing: 1px; font-size: 16px; }
      .lives { color: #ff4466; }

      /* ─── Level Up Flash ─── */
      #level-up {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-size: 36px; font-weight: 900; letter-spacing: 6px;
        color: #ffd700; text-shadow: 0 0 30px #ffd700, 0 0 60px #ff8800;
        pointer-events: none; z-index: 15;
        opacity: 0; transition: none;
      }
      #level-up.show {
        opacity: 1;
        animation: levelUpAnim 1.2s ease-out forwards;
      }
      @keyframes levelUpAnim {
        0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
        20% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
      }

      /* ─── Overlay ─── */
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        background: radial-gradient(ellipse at center, rgba(5,5,16,0.85), rgba(5,5,16,0.95));
        z-index: 20; cursor: pointer;
        backdrop-filter: blur(4px);
      }
      #overlay.hidden { display: none; }
      #overlay h1 {
        font-size: clamp(36px, 8vw, 72px); font-weight: 900;
        letter-spacing: 8px; margin-bottom: 16px;
        background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 50%, #4488ff 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
        animation: titlePulse 3s ease-in-out infinite;
      }
      @keyframes titlePulse {
        0%, 100% { filter: drop-shadow(0 0 20px rgba(255,215,0,0.4)); }
        50% { filter: drop-shadow(0 0 40px rgba(255,215,0,0.7)); }
      }
      #overlay p {
        font-size: 18px; opacity: 0.8; letter-spacing: 3px;
        animation: blink 2s ease-in-out infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 0.8; } 50% { opacity: 0.3; }
      }
      #overlay .sub { font-size: 12px; opacity: 0.35; margin-top: 12px; letter-spacing: 2px; }
      #overlay .controls {
        margin-top: 32px; font-size: 11px; opacity: 0.3;
        line-height: 1.8; text-align: center; letter-spacing: 1px;
      }

      /* ─── Score Popup ─── */
      .score-popup {
        position: fixed; pointer-events: none; z-index: 12;
        font-size: 16px; font-weight: 700;
        color: #ffd700; text-shadow: 0 0 8px #ffd700;
        animation: popUp 0.8s ease-out forwards;
      }
      @keyframes popUp {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-40px) scale(0.6); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="hud-score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Level</span>
        <span class="hud-value" id="hud-level">1</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Power</span>
        <span class="hud-value penetration-stars" id="hud-penetration"></span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Lives</span>
        <span class="hud-value lives" id="hud-lives"></span>
      </div>
    </div>
    <div id="level-up">LEVEL UP!</div>
    <div id="overlay">
      <h1 id="overlay-title">BOKUZUSHI</h1>
      <p id="overlay-message">CLICK TO START</p>
      <p class="sub" id="overlay-sub">Star Breaker</p>
      <div class="controls">
        MOUSE / TOUCH &mdash; Move Paddle<br/>
        CLICK &mdash; Launch Ball
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
