<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ざわり銀河</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #09040c;
        --bg-deep: #14081b;
        --panel: rgba(17, 10, 28, 0.92);
        --panel-strong: rgba(11, 8, 20, 0.96);
        --line: rgba(255, 211, 115, 0.22);
        --line-soft: rgba(255, 255, 255, 0.08);
        --gold: #ffcb55;
        --hot: #ff7b42;
        --pink: #ff6f91;
        --cyan: #6fe1ff;
        --paper: #ffe3a6;
        --text: #fff7ea;
        --label-font: "DotGothic16", monospace;
        --display-font: "Zen Kaku Gothic New", "Hiragino Sans", "Yu Gothic", sans-serif;
        --accent-gradient: linear-gradient(135deg, #ffcb55 0%, #ff8a43 46%, #ff6f91 100%);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        min-height: 100%;
        overflow: hidden;
        touch-action: none;
      }
      body {
        overflow-x: hidden;
        background:
          radial-gradient(circle at 20% 14%, rgba(255, 132, 66, 0.24), transparent 24%),
          radial-gradient(circle at 78% 18%, rgba(77, 163, 255, 0.18), transparent 18%),
          radial-gradient(circle at 50% 100%, rgba(255, 60, 108, 0.16), transparent 26%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 48%, #060309 100%);
        color: var(--text);
        font-family: var(--display-font);
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }

      body,
      #hud,
      #hud *,
      #overlay,
      #overlay *,
      #pause-overlay,
      #pause-overlay * {
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.035) 0,
          rgba(255, 255, 255, 0.035) 1px,
          transparent 1px,
          transparent 4px
        );
        mix-blend-mode: soft-light;
        opacity: 0.28;
      }

      body::after {
        background:
          linear-gradient(90deg, rgba(255, 203, 85, 0.05), transparent 20%, transparent 80%, rgba(255, 111, 145, 0.06)),
          radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.34) 100%);
      }

      button, input { font: inherit; }
      button,
      .world-btn,
      .action-button,
      .toggle-button,
      .utility-button {
        touch-action: manipulation;
      }
      button:focus-visible {
        outline: 3px solid rgba(255, 216, 107, 0.9);
        outline-offset: 3px;
      }

      canvas#game {
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        touch-action: none;
      }

      #hud {
        position: fixed;
        top: 0;
        left: 0;
        width: min(620px, calc(100vw - 74px));
        z-index: 10;
        pointer-events: none;
        padding: max(10px, env(safe-area-inset-top)) 12px 0;
      }

      .hud-shell {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 10px;
        align-items: center;
        padding: 10px 12px;
        border: 2px solid rgba(255, 203, 85, 0.3);
        border-radius: 24px 10px 22px 12px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 24%),
          linear-gradient(180deg, rgba(13, 8, 22, 0.96), rgba(17, 10, 28, 0.9));
        box-shadow:
          0 22px 40px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .hud-item {
        min-width: fit-content;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 6px;
      }

      .hud-item.fever-top {
        min-width: 124px;
      }

      .hud-label {
        font-family: var(--label-font);
        font-size: 9px;
        letter-spacing: 2px;
        opacity: 0.7;
        color: rgba(255, 227, 166, 0.8);
      }

      .hud-value {
        font-size: 16px;
        font-weight: 900;
        text-shadow: 0 0 10px currentColor;
        transition: transform 0.15s;
        white-space: nowrap;
      }

      #hud-level.level-up {
        animation: hudLevelPulse 0.72s ease-out;
      }

      .penetration-stars {
        color: var(--gold);
        font-size: 13px;
        letter-spacing: 1px;
      }

      .penetration-stars.level-up {
        animation: hudTierPulse 0.72s ease-out;
      }

      .world-info {
        color: #ffcc88;
        font-size: 14px;
        letter-spacing: 1px;
      }

      .ball-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .ball-row.level-up {
        animation: hudBallRowPulse 0.9s ease-out;
      }

      .ball-color-indicator {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.55);
        transition: background 0.2s, box-shadow 0.2s;
      }

      .ball-color-indicator.level-up {
        animation: hudBallPulse 0.82s ease-out;
      }

      .fever-meter {
        width: 96px;
        padding: 4px 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 203, 85, 0.18);
      }

      .fever-track {
        width: 100%;
        height: 9px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .fever-fill {
        width: 100%;
        height: 100%;
        transform-origin: left center;
        transform: scaleX(0);
        border-radius: inherit;
        background:
          linear-gradient(90deg, #ffe259 0%, #ff8a00 45%, #ff4775 75%, #fff2bd 100%);
        box-shadow: 0 0 14px rgba(255, 152, 0, 0.6);
        transition: transform 0.18s ease-out;
      }

      .fever-state {
        display: block;
        margin-top: 2px;
        text-align: center;
        font-family: "Orbitron", sans-serif;
        font-size: 9px;
        letter-spacing: 1px;
        color: #ffd86b;
      }

      .fever-state[data-active="true"] {
        color: #fff8b0;
        text-shadow: 0 0 14px rgba(255, 236, 129, 0.9);
      }

      .utility-button,
      .action-button,
      .toggle-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 2px solid rgba(255, 203, 85, 0.22);
        border-radius: 14px;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 28%),
          linear-gradient(180deg, rgba(27, 15, 41, 0.94), rgba(14, 9, 24, 0.94));
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 10px 22px rgba(0, 0, 0, 0.24);
      }

      .utility-button:hover,
      .action-button:hover,
      .toggle-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      }

      .utility-button:active,
      .action-button:active,
      .toggle-button:active {
        transform: translateY(1px) scale(0.98);
      }

      #pause-btn {
        position: fixed;
        top: calc(max(10px, env(safe-area-inset-top)) + 54px);
        right: 14px;
        z-index: 11;
        width: 44px;
        height: 44px;
        font-size: 17px;
        line-height: 1;
      }

      #pause-btn > span {
        display: block;
        transform: translateY(-1px);
      }

      #pause-btn.hidden { display: none; }

      #mobile-dock {
        position: fixed;
        left: 50%;
        bottom: calc(max(12px, env(safe-area-inset-bottom)) + 10px);
        transform: translateX(-50%);
        z-index: 11;
        display: none;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 18px;
        border: 2px solid rgba(255, 203, 85, 0.18);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 28%),
          rgba(14, 9, 24, 0.94);
        box-shadow: 0 16px 28px rgba(0, 0, 0, 0.3);
        pointer-events: none;
      }

      .mobile-dock-wave {
        font-family: "Orbitron", sans-serif;
        font-size: 12px;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.72);
        white-space: nowrap;
      }

      .mobile-dock-fever {
        width: 120px;
      }

      .mobile-dock-fever .fever-state {
        font-size: 10px;
      }

      #pause-overlay,
      #overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        text-align: center;
        padding: 20px;
      }

      #pause-overlay {
        display: none;
        z-index: 19;
        justify-content: center;
        align-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 111, 145, 0.12), transparent 30%),
          rgba(7, 4, 12, 0.88);
        backdrop-filter: blur(8px);
      }

      #pause-overlay.show { display: flex; }

      .dialog-card {
        position: relative;
        width: min(460px, calc(100vw - 32px));
        padding: 28px 24px 24px;
        border: 2px solid rgba(255, 203, 85, 0.26);
        border-radius: 30px 10px 30px 10px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 24%),
          linear-gradient(180deg, rgba(18, 11, 29, 0.98), rgba(10, 7, 18, 0.96));
        box-shadow:
          0 36px 72px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .dialog-card::before {
        content: "小休止";
        position: absolute;
        top: 14px;
        left: 18px;
        font-family: var(--label-font);
        font-size: 10px;
        letter-spacing: 2px;
        color: rgba(255, 227, 166, 0.74);
      }

      .dialog-card h2 {
        font-size: clamp(34px, 8vw, 60px);
        font-weight: 900;
        letter-spacing: 8px;
        text-align: left;
      }

      .dialog-card p {
        margin-top: 12px;
        font-size: 16px;
        opacity: 0.8;
        line-height: 1.8;
        text-align: left;
      }

      .dialog-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-start;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .action-button {
        min-width: 160px;
        padding: 12px 18px;
        font-weight: 900;
        letter-spacing: 3px;
      }

      .action-button.primary {
        background: var(--accent-gradient);
        color: #1f0900;
        border-color: rgba(255, 247, 234, 0.4);
      }

      .action-button.secondary {
        color: rgba(255, 247, 234, 0.88);
      }

      .action-button.hidden { display: none; }

      .overlay-corner-button { min-width: 150px; }

      .utility-row {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .toggle-button,
      .utility-button {
        padding: 10px 14px;
        font-size: 14px;
        letter-spacing: 1px;
      }

      #overlay {
        justify-content: center;
        align-items: stretch;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
        background:
          radial-gradient(circle at 18% 16%, rgba(255, 120, 66, 0.14), transparent 22%),
          radial-gradient(circle at 84% 18%, rgba(111, 225, 255, 0.1), transparent 18%),
          linear-gradient(180deg, rgba(6, 3, 9, 0.78), rgba(8, 5, 14, 0.94));
        backdrop-filter: blur(2px);
      }

      #overlay.hidden { display: none; }

      .overlay-stack {
        position: relative;
        width: min(1120px, 100%);
        min-height: calc(100dvh - 40px);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: stretch;
        gap: 28px;
        padding:
          max(40px, env(safe-area-inset-top))
          0
          max(44px, env(safe-area-inset-bottom));
      }

      .overlay-main {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.72fr);
        gap: 22px;
        align-items: start;
      }

      .overlay-kicker,
      .panel-kicker,
      .rail-kicker {
        font-family: var(--label-font);
        font-size: 11px;
        letter-spacing: 2px;
        color: rgba(255, 227, 166, 0.86);
      }

      .overlay-hero,
      .overlay-guides {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
      }

      .overlay-hero {
        max-width: 740px;
        gap: 12px;
      }

      .overlay-kicker {
        padding: 6px 12px;
        border: 1px solid rgba(255, 203, 85, 0.28);
        border-radius: 999px;
        background: rgba(255, 203, 85, 0.08);
      }

      .chapter-panel,
      .overlay-rail {
        position: relative;
        overflow: hidden;
        border: 2px solid rgba(255, 203, 85, 0.2);
        border-radius: 30px 10px 30px 10px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 22%),
          linear-gradient(180deg, rgba(20, 11, 32, 0.96), rgba(10, 7, 18, 0.95));
        box-shadow:
          0 28px 50px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .chapter-panel {
        padding: 24px 22px 22px;
      }

      .overlay-rail {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px;
      }

      #overlay h1 {
        font-size: clamp(64px, 10vw, 142px);
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: clamp(4px, 0.8vw, 10px);
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter:
          drop-shadow(0 0 18px rgba(255, 203, 85, 0.28))
          drop-shadow(0 16px 32px rgba(0, 0, 0, 0.46));
        animation: titlePulse 3s ease-in-out infinite;
      }

      #overlay-message {
        font-size: clamp(26px, 3vw, 42px);
        font-weight: 900;
        letter-spacing: 0.22em;
        color: var(--paper);
        text-align: left;
      }

      #overlay .sub {
        font-family: var(--label-font);
        font-size: clamp(12px, 1.8vw, 17px);
        opacity: 0.72;
        letter-spacing: 3px;
      }

      .controls,
      .color-hint {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--line-soft);
        border-radius: 18px 8px 18px 8px;
        background: rgba(255, 255, 255, 0.025);
        font-size: 13px;
        line-height: 1.85;
        letter-spacing: 1px;
        opacity: 0.74;
        text-align: left;
      }

      .color-hint span {
        display: inline-block;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        margin: 0 3px;
        vertical-align: middle;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      #world-select {
        display: none;
        width: 100%;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        align-items: stretch;
      }

      #world-select.show { display: grid; }

      #world-select-label {
        grid-column: 1 / -1;
        width: 100%;
        margin-bottom: 2px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-family: var(--label-font);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 4px;
        opacity: 0.72;
        text-align: left;
      }

      .world-btn {
        position: relative;
        min-height: 144px;
        border-radius: 22px 8px 22px 8px;
        border: 2px solid rgba(255, 255, 255, 0.14);
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 26%),
          linear-gradient(180deg, rgba(31, 18, 48, 0.94), rgba(11, 8, 20, 0.96));
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-end;
        gap: 6px;
        padding: 16px 12px 14px;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease, border-color 0.2s ease;
        text-align: left;
      }

      .world-btn::before {
        content: "解放";
        position: absolute;
        top: 10px;
        right: 10px;
        font-family: var(--label-font);
        font-size: 9px;
        letter-spacing: 2px;
        opacity: 0.72;
      }

      .world-btn:hover {
        transform: translateY(-3px) rotate(-1deg);
        box-shadow: 0 20px 34px rgba(0, 0, 0, 0.34);
        border-color: rgba(255, 203, 85, 0.42);
      }

      .world-btn.locked {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .world-btn.locked::before {
        content: "封鎖";
        color: rgba(255, 255, 255, 0.55);
      }

      .world-btn-emoji { font-size: 34px; line-height: 1; align-self: center; margin-bottom: 4px; }
      .world-btn-name { font-size: 24px; font-weight: 900; letter-spacing: 2px; }
      .world-btn-sub { font-size: 11px; opacity: 0.66; letter-spacing: 1px; }
      .world-btn-stages {
        display: flex;
        gap: 4px;
        margin-top: 6px;
      }
      .world-btn-stage {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.16);
      }
      .world-btn-stage.filled {
        background: currentColor;
        box-shadow: 0 0 10px currentColor;
      }

      #world-select .world-btn:last-child {
        grid-column: 2 / span 2;
      }

      #ranking {
        width: 100%;
        margin-top: 2px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 14px;
      }

      #ranking-slot {
        width: 100%;
        display: block;
      }

      .ranking-title {
        grid-column: 1 / -1;
        margin-bottom: 8px;
        font-family: var(--label-font);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 4px;
        opacity: 0.62;
        text-align: left;
      }

      .ranking-section {
        padding: 10px 12px 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px 8px 16px 8px;
        background: rgba(255, 255, 255, 0.025);
      }

      .ranking-section-title {
        margin-bottom: 6px;
        font-family: var(--label-font);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 2px;
        opacity: 0.7;
        text-align: left;
      }

      .ranking-row {
        display: flex;
        justify-content: flex-start;
        gap: 12px;
        font-size: 13px;
        line-height: 1.8;
        opacity: 0.74;
      }

      .ranking-rank { width: 24px; text-align: right; opacity: 0.5; }
      .ranking-score { min-width: 60px; font-weight: 900; color: var(--gold); }
      .ranking-world { opacity: 0.64; }
      .ranking-empty { font-size: 12px; line-height: 1.8; opacity: 0.46; }

      #flash,
      #rainbow-border,
      #shockwave,
      #level-up,
      #combo,
      #big-text,
      #star-praise {
        position: fixed;
        pointer-events: none;
      }

      #flash {
        inset: 0;
        z-index: 14;
        opacity: 0;
      }

      #rainbow-border {
        inset: 0;
        z-index: 13;
        opacity: 0;
        border: 12px solid transparent;
      }

      #rainbow-border.active {
        opacity: 1;
        animation: rainbowBorder 0.15s linear infinite, borderPulse 0.3s ease-in-out infinite;
      }

      #shockwave {
        z-index: 15;
        width: 10px;
        height: 10px;
        opacity: 0;
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0);
      }

      #shockwave.active { animation: shockwaveAnim 0.6s ease-out forwards; }

      #level-up,
      #big-text {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 16;
        opacity: 0;
      }

      #combo {
        top: 30%;
        right: 5%;
        transform: translateY(-50%);
        z-index: 16;
        opacity: 0;
      }

      #level-up { display: none; }

      #combo {
        font-family: "Orbitron", sans-serif;
        font-size: var(--combo-font-size, clamp(28px, 6vw, 48px));
        font-weight: 900;
        color: #ff4444;
        text-shadow: 0 0 30px #ff0000, 0 0 60px #ff4400, 0 0 100px #ff0000;
      }

      #combo.show { animation: comboAnim 1s ease-out forwards; }

      #big-text {
        white-space: nowrap;
        text-align: center;
        letter-spacing: 8px;
        font-weight: 900;
        z-index: 17;
      }

      #big-text.show { opacity: 1; }

      #star-praise {
        inset: 0;
        z-index: 18;
        opacity: 0;
      }

      #star-praise.show {
        opacity: 1;
        animation: starPraiseBurst 4.1s ease-out forwards;
      }

      .star-praise-shell {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        perspective: 1800px;
        perspective-origin: 50% 48%;
        transform-style: preserve-3d;
        background:

          transform: translate(-50%, -50%) translate3d(var(--word-drift-x), var(--word-drift-y), var(--word-depth)) rotateX(var(--word-tilt-x)) rotateY(var(--word-tilt-y)) rotateZ(var(--word-rotate)) scale(var(--word-scale));
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) translate3d(calc(var(--word-drift-x) + 8px), calc(var(--word-drift-y) - 24px), calc(var(--word-depth) + 96px)) rotateX(calc(var(--word-tilt-x) - 8deg)) rotateY(calc(var(--word-tilt-y) + 14deg)) rotateZ(calc(var(--word-rotate) + 32deg)) scale(calc(var(--word-scale) * 1.05));
        }
      }

      @keyframes starPraiseAura1 {
        0% { opacity: 0; transform: translate(-50%, -50%) translateZ(-80px) scale(0.2); }
        20% { opacity: 0.88; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.3)) scale(1.06); }
        84% { opacity: 0.56; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.18)) scale(1.18); }
        100% { opacity: 0; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.08)) scale(1.32); }
      }

      @keyframes starPraiseAura2 {
        0% { opacity: 0; transform: translate(-50%, -50%) translateZ(-120px) scale(0.16) rotate(0deg); }
        18% { opacity: 0.86; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.35)) scale(0.92) rotate(26deg); }
        84% { opacity: 0.5; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.16)) scale(1.28) rotate(92deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.02)) scale(1.48) rotate(130deg); }
      }

      @keyframes starPraiseAura3 {
        0% { opacity: 0; transform: translate(-50%, -50%) translateZ(-60px) scale(0.24) skewX(-22deg); }
        20% { opacity: 0.92; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.24)) scale(1.04) skewX(8deg); }
        84% { opacity: 0.52; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.12)) scale(1.24) skewX(-10deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * 0.02)) scale(1.4) skewX(16deg); }
      }

      @keyframes starPraiseAura4 {
        0% { opacity: 0; transform: translate(-50%, -50%) translateZ(-140px) scale(0.18) rotateX(50deg); }
        18% { opacity: 0.88; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.28)) scale(1.08) rotateX(-12deg); }
        84% { opacity: 0.54; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.1)) scale(1.22) rotateX(10deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * 0.05)) scale(1.36) rotateX(-8deg); }
      }

      @keyframes starPraiseAura5 {
        0% { opacity: 0; transform: translate(-50%, -50%) translateZ(-80px) scale(0.3) rotate(0deg); }
        18% { opacity: 0.9; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.24)) scale(1.18) rotate(-16deg); }
        84% { opacity: 0.5; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.1)) scale(1.12) rotate(16deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * 0.06)) scale(1.44) rotate(32deg); }
      }

      @keyframes starPraiseAura6 {
        0% { opacity: 0; transform: translate(-50%, -50%) translateZ(-120px) scale(0.14) rotateY(70deg); }
        20% { opacity: 0.92; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.32)) scale(0.96) rotateY(-18deg); }
        84% { opacity: 0.48; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.16)) scale(1.3) rotateY(18deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * 0.04)) scale(1.5) rotateY(-4deg); }
      }

      @keyframes starPraiseAura7 {
        0% { opacity: 0; transform: translate(-50%, -50%) translateZ(-90px) scale(0.18) rotateX(-45deg) rotate(0deg); }
        18% { opacity: 0.86; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.34)) scale(1.02) rotateX(10deg) rotate(-30deg); }
        84% { opacity: 0.56; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.1)) scale(1.18) rotateX(-6deg) rotate(46deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * 0.02)) scale(1.38) rotateX(8deg) rotate(76deg); }
      }

      @keyframes starPraiseAura8 {
        0% { opacity: 0; transform: translate(-50%, -50%) translateZ(-70px) scale(0.26); }
        20% { opacity: 0.84; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.26)) scale(1.14); }
        84% { opacity: 0.52; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * -0.12)) scale(1.34); }
        100% { opacity: 0; transform: translate(-50%, -50%) translateZ(calc(var(--word-depth) * 0.08)) scale(1.6); }
      }

      @keyframes rainbowText {
        0% { background-position: 0% 50%; }
        100% { background-position: 400% 50%; }
      }

      @keyframes popUp {
        0% { transform: translateY(0) scale(1.4); opacity: 1; }
        35% { transform: translateY(-20px) scale(1.0); opacity: 1; }
        100% { transform: translateY(-80px) scale(0.4); opacity: 0; }
      }

      @media (max-width: 720px) {
        #hud {
          width: calc(100vw - 68px);
        }

        .hud-shell {
          gap: 6px 8px;
          padding: 6px 8px;
        }

        .hud-label { display: none; }
        .hud-value { font-size: 14px; }
        .world-info { font-size: 13px; }
        .fever-meter { width: 74px; }
        .ball-color-indicator { width: 14px; height: 14px; }
        .overlay-main { grid-template-columns: 1fr; }
        .overlay-hero { max-width: none; }
        .overlay-stack { justify-content: flex-start; }
        .chapter-panel,
        .overlay-rail { padding: 18px 16px; }
        #world-select { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        #world-select .world-btn:last-child { grid-column: 1 / -1; }
        #ranking { grid-template-columns: minmax(0, 1fr); }
        .star-praise-headline {
          width: min(92vw, 560px);
          font-size: clamp(52px, 18vw, 120px);
        }
        .star-praise-word {
          max-width: 18vw;
          font-size: clamp(8px, 1.9vw, 12px);
        }
      }

      @media (pointer: coarse) {
        #mobile-dock {
          display: flex;
        }

        .hud-item.fever-top,
        .hud-item:last-child {
          display: none;
        }

        #hud {
          top: auto;
          left: 8px;
          right: 8px;
          bottom: calc(max(12px, env(safe-area-inset-bottom)) + 84px);
          width: auto;
          padding: 0;
        }

        .hud-shell {
          justify-content: center;
          gap: 8px 12px;
          padding: 8px 12px;
        }
      }

      @media (max-width: 420px) {
        #overlay { padding: 16px; }
        .overlay-stack {
          gap: 22px;
          padding-top: max(28px, env(safe-area-inset-top));
          padding-bottom: max(40px, env(safe-area-inset-bottom));
        }
        #overlay h1 { font-size: clamp(52px, 18vw, 86px); }
        #overlay-message { font-size: 24px; letter-spacing: 0.12em; }
        #world-select-label {
          font-size: 10px;
          letter-spacing: 2px;
          line-height: 1.45;
        }
        .world-btn { min-height: 116px; padding: 14px 10px 12px; }
        .world-btn-emoji { font-size: 26px; }
        .world-btn-name { font-size: 18px; }
        .world-btn-sub { font-size: 10px; }
        .world-btn-stage { width: 7px; height: 7px; }
        .controls, .color-hint { font-size: 13px; }
      }

      @media (max-height: 760px) {
        .overlay-stack {
          justify-content: flex-start;
        }
      }

      @media (orientation: landscape) and (max-height: 500px) {
        #overlay {
          padding: 12px;
          align-items: flex-start;
        }

        .overlay-stack {
          width: 100%;
          min-height: auto;
          display: grid;
          grid-template-columns: minmax(0, 0.72fr) minmax(0, 1.28fr);
          align-items: start;
          gap: 14px;
          padding-top: max(6px, env(safe-area-inset-top));
          padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .overlay-hero {
          gap: 8px;
          max-width: none;
        }

        .overlay-main {
          grid-template-columns: minmax(0, 1fr);
          gap: 12px;
        }

        #overlay h1 {
          font-size: clamp(46px, 18vw, 74px);
          letter-spacing: 3px;
        }

        #overlay-message {
          font-size: clamp(18px, 5vw, 28px);
          letter-spacing: 0.1em;
        }

        #overlay .sub {
          font-size: 11px;
          letter-spacing: 2px;
        }

        .chapter-panel {
          padding: 16px 14px 14px;
        }

        .overlay-rail {
          gap: 10px;
          padding: 14px;
        }

        #world-select {
          gap: 10px;
        }

        #world-select-label {
          font-size: 10px;
          letter-spacing: 2px;
          line-height: 1.4;
          padding-bottom: 8px;
        }

        .world-btn {
          min-height: 92px;
          gap: 4px;
          padding: 10px 10px 10px;
        }

        .world-btn-emoji {
          font-size: 22px;
          margin-bottom: 2px;
        }

        .world-btn-name {
          font-size: 16px;
        }

        .world-btn-sub {
          font-size: 9px;
        }

        .world-btn-stage {
          width: 7px;
          height: 7px;
        }

        .controls,
        .color-hint {
          padding: 12px;
          font-size: 12px;
          line-height: 1.6;
        }
      }

      #overlay[data-mode="interstitial"] .overlay-main {
        grid-template-columns: minmax(0, 420px);
        justify-content: center;
      }

      #overlay[data-mode="interstitial"] {
        align-items: center;
      }

      #overlay[data-mode="start"] .chapter-panel .dialog-actions {
        display: none;
      }

      #overlay[data-mode="interstitial"] .overlay-rail {
        display: none;
      }

      #overlay[data-mode="interstitial"] .chapter-panel {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      #overlay[data-mode="interstitial"] .dialog-actions {
        margin-top: 12px;
      }

      #overlay[data-mode="interstitial"] .overlay-hero {
        max-width: 520px;
        align-items: center;
        text-align: center;
      }

      #overlay[data-mode="interstitial"] #overlay-message,
      #overlay[data-mode="interstitial"] .sub {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="hud-shell">
        <div class="hud-item">
          <span class="hud-label">得点</span>
          <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">段位</span>
          <span class="hud-value" id="hud-level">1</span>
        </div>
        <div class="hud-item fever-top">
          <span class="hud-label">ざわり</span>
          <div class="fever-meter">
            <div class="fever-track">
              <div class="fever-fill" id="hud-fever-fill"></div>
            </div>
            <span class="fever-state" id="hud-fever-state" data-active="false">気配</span>
          </div>
        </div>
        <div class="hud-item">
          <span class="hud-label">玉色</span>
          <div class="ball-row">
            <div class="ball-color-indicator" id="hud-ball-color" aria-hidden="true"></div>
            <span class="hud-value penetration-stars" id="hud-penetration"></span>
          </div>
        </div>
        <div class="hud-item">
          <span class="hud-value world-info" id="hud-world">桜花 1巡目</span>
        </div>
      </div>
    </div>

    <div id="mobile-dock" aria-hidden="true">
      <div class="mobile-dock-wave" id="mobile-wave">桜花 1巡目</div>
      <div class="fever-meter mobile-dock-fever">
        <div class="fever-track">
          <div class="fever-fill" id="mobile-fever-fill"></div>
        </div>
        <span class="fever-state" id="mobile-fever-state" data-active="false">気配</span>
      </div>
    </div>

    <button
      id="pause-btn"
      class="utility-button hidden"
      type="button"
      aria-label="ポーズ"
      title="ポーズ"
    >
      <span aria-hidden="true">⏸</span>
    </button>

    <div id="pause-overlay" aria-hidden="true">
      <div class="dialog-card">
        <h2>小休止</h2>
        <p>まだ流れは残っている。焦らず、次の一打だけ返せ。</p>
        <div class="dialog-actions">
          <button id="pause-resume-btn" class="action-button primary" type="button">
            再開
          </button>
          <button id="pause-world-select-btn" class="action-button secondary" type="button">
            銀河選択
          </button>
        </div>
      </div>
    </div>

    <div id="flash"></div>
    <div id="rainbow-border"></div>
    <div id="shockwave"></div>
    <div id="level-up" aria-live="polite"></div>
    <div id="combo" aria-live="polite"></div>
    <div id="big-text" aria-live="polite"></div>
    <div id="star-praise" aria-live="polite"></div>

    <div id="overlay" data-mode="start">
      <div class="overlay-stack">
        <div class="overlay-hero">
          <div class="overlay-kicker">遊技宇宙案内</div>
          <h1 id="overlay-title">ざわり銀河</h1>
          <p id="overlay-message">銀河を選べ</p>
          <p class="sub" id="overlay-sub">当たり星まで通せ</p>
        </div>

        <div class="overlay-main">
          <section class="chapter-panel">
            <div class="panel-kicker" id="overlay-panel-kicker">解放中の銀河</div>
            <div id="world-select" class="show">
              <div id="world-select-label">潜る銀河を選べ</div>
            </div>

            <div class="dialog-actions">
              <button id="overlay-action" class="action-button primary hidden" type="button">
                次へ
              </button>
              <button id="overlay-secondary-action" class="action-button secondary overlay-corner-button hidden" type="button">
                銀河選択
              </button>
            </div>
          </section>

          <aside class="overlay-rail">
            <div class="rail-kicker">遊び方</div>
            <div class="overlay-guides">
              <div class="color-hint">
                障壁を穿って段位を上げ<br />
                <span style="background:#33cc66"></span><span style="background:#3388ff"></span><span style="background:#ffcc00"></span><span style="background:#ff8822"></span><span style="background:#ff3344"></span><span style="background:#4444cc"></span><span style="background:#9933cc"></span><br />
                強い玉色で貫通し、アガりで盤ごと飲み込め
              </div>

              <div class="controls">
                マウス / タッチ / ← → で返し板移動。クリック / タップ / Enter / Space で発射。<br />
                Escape で小休止。ざわりが満ちるとアガりへ入り、その間は得点 2 倍。
              </div>
            </div>

            <div id="ranking-slot"></div>
          </aside>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
