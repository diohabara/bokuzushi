<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bokuzushi - 星破壊ブロック崩し</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #0a0a1a;
        font-family: "Segoe UI", sans-serif;
        color: #fff;
      }
      canvas#game {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: none;
        font-size: 18px;
        z-index: 10;
        text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
      }
      #hud .hud-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #hud .hud-label {
        opacity: 0.7;
        font-size: 14px;
      }
      #hud .hud-value {
        font-weight: bold;
        font-size: 20px;
      }
      #hud .penetration-stars {
        color: #ffd700;
        letter-spacing: 2px;
      }
      #hud .lives {
        color: #ff4466;
      }
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.75);
        z-index: 20;
        cursor: pointer;
      }
      #overlay.hidden {
        display: none;
      }
      #overlay h1 {
        font-size: 48px;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #ffd700, #ff6b6b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      #overlay p {
        font-size: 20px;
        opacity: 0.8;
      }
      #overlay .sub {
        font-size: 14px;
        opacity: 0.5;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="hud-score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">LEVEL</span>
        <span class="hud-value" id="hud-level">1</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">PENETRATION</span>
        <span class="hud-value penetration-stars" id="hud-penetration"></span>
      </div>
      <div class="hud-item">
        <span class="hud-label">LIVES</span>
        <span class="hud-value lives" id="hud-lives"></span>
      </div>
    </div>
    <div id="overlay">
      <h1 id="overlay-title">BOKUZUSHI</h1>
      <p id="overlay-message">Click to Start</p>
      <p class="sub" id="overlay-sub">Mouse / Touch to move paddle</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
